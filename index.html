<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background: #1e293b; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #475569; box-sizing: border-box; font-size: 16px; }
        input { background: #334155; color: white; }
        button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 16px; }
        button:hover { background: #1d4ed8; }
        
        /* Progress Bar Styling */
        .meter-container { margin-top: 12px; }
        .meter-label { font-size: 14px; font-weight: bold; color: #94a3b8; display: flex; justify-content: space-between; }
        .meter-bar-bg { background: #334155; height: 8px; width: 100%; border-radius: 4px; margin-top: 6px; overflow: hidden; }
        .meter-bar-fill { height: 100%; width: 0%; background: #ef4444; transition: width 0.3s ease, background-color 0.3s ease; }
        
        .result { margin-top: 20px; padding: 16px; border-radius: 8px; display: none; }
        .danger { background: #7f1d1d; border: 1px solid #f87171; }
        .success { background: #14532d; border: 1px solid #4ade80; }
        .output-key { font-family: monospace; background: #0f172a; padding: 8px; display: block; margin-top: 8px; word-break: break-all; border: 1px solid #475569; }
    </style>
</head>
<body>

<div class="card">
    <h2>Password Integrity Guard</h2>
    <p>Check if your password is leaked and generate cryptographic alternatives.</p>
    
    <!-- User Input Field -->
    <label for="passwordInput">Enter Password to Test:</label>
    <input type="password" id="passwordInput" placeholder="Type a password..." oninput="updateStrengthMeter()">
    
    <!-- Visual Complexity Bar Components -->
    <div class="meter-container">
        <div class="meter-label">
            <span>Visual Complexity:</span>
            <span id="strengthText">Empty</span>
        </div>
        <div class="meter-bar-bg">
            <div id="meterFill" class="meter-bar-fill"></div>
        </div>
    </div>

    <!-- Live Character Checklist Container Component -->
    <div id="checklistContainer" style="margin-top: 14px; font-size: 14px; color: #94a3b8; display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
        <div id="checkLower">✗ Lowercase (a-z)</div>
        <div id="checkUpper">✗ Uppercase (A-Z)</div>
        <div id="checkNum">✗ Number (0-9)</div>
        <div id="checkSym">✗ Symbol (!@#$)</div>
        <div id="checkLen" style="grid-column: span 2;">✗ Min Length (16+ chars)</div>
    </div>

    <!-- Submission Action Button -->
    <button onclick="evaluatePassword()">Analyze & Shield</button>

    <!-- Results Panel -->
    <div id="resultBox" class="result">
        <div id="statusMessage"></div>
        <div id="generatorSection" style="margin-top: 12px; display: none;">
            <strong>Generated 44-Character Crypto Key:</strong>
            <span id="cryptoKey" class="output-key"></span>
        </div>
    </div>
</div>

<!-- Embedded Script Content -->
<script>
function updateStrengthMeter(")"{
   "const password = document.getElementById(""passwordInput"").value;
    const meterFill = document.getElementById(""meterFill"");
    const strengthText = document.getElementById(""strengthText"");

    const checkLower = document.getElementById(""checkLower"");
    const checkUpper = document.getElementById(""checkUpper"");
    const checkNum = document.getElementById(""checkNum"");
    const checkSym = document.getElementById(""checkSym"");
    const checkLen = document.getElementById(""checkLen"");
    
    if (!password)"{
      "meterFill.style.width =""0%"";
        strengthText.innerText =""Empty"";
        strengthText.style.color =""#94a3b8"";
        
        checkLower.innerHTML =""✗ Lowercase (a-z)""; checkLower.style.color =""#94a3b8"";
        checkUpper.innerHTML =""✗ Uppercase (A-Z)""; checkUpper.style.color =""#94a3b8"";
        checkNum.innerHTML =""✗ Number (0-9)""; checkNum.style.color =""#94a3b8"";
        checkSym.innerHTML =""✗ Symbol (!@#$)""; checkSym.style.color =""#94a3b8"";
        checkLen.innerHTML =""✗ Min Length (16+ chars)""; checkLen.style.color =""#94a3b8"";
        return;"
   }let score = 0;
    
    if (/[
      "a-z"
   ]"/.test(password))"{
      "score++; checkLower.innerHTML =""✓ Lowercase (a-z)""; checkLower.style.color =""#4ade80"";"
   }"else"{
      "checkLower.innerHTML =""✗ Lowercase (a-z)""; checkLower.style.color =""#94a3b8"";"
   }"if (/"[
      "A-Z"
   ]"/.test(password))"{
      "score++; checkUpper.innerHTML =""✓ Uppercase (A-Z)""; checkUpper.style.color =""#4ade80"";"
   }"else"{
      "checkUpper.innerHTML =""✗ Uppercase (A-Z)""; checkUpper.style.color =""#94a3b8"";"
   }"if (/"[
      0-9
   ]"/.test(password))"{
      "score++; checkNum.innerHTML =""✓ Number (0-9)""; checkNum.style.color =""#4ade80"";"
   }"else"{
      "checkNum.innerHTML =""✗ Number (0-9)""; checkNum.style.color =""#94a3b8"";"
   }"if (/"[
      ^A-Za-z0-9
   ]"/.test(password))"{
      "score++; checkSym.innerHTML =""✓ Symbol (!@#$)""; checkSym.style.color =""#4ade80"";"
   }"else"{
      "checkSym.innerHTML =""✗ Symbol (!@#$)""; checkSym.style.color =""#94a3b8"";"
   }if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (password.length >= 16) score++;
    if (password.length >= 20) score++;
    if (password.length >= 24) score += 1.5;
    if (password.length >= 28) score += 1.5;
    if (password.length >= 32) score += 2;
    if (password.length >= 36) score += 2;

    if (password.length >= 16){
      "checkLen.innerHTML =""✓ Min Length (16+ chars)""; checkLen.style.color =""#4ade80"";"
   }"else"{
      "checkLen.innerHTML =""✗ Min Length (16+ chars)""; checkLen.style.color =""#f87171"";"
   }const percentage = Math.min((score / 15) * 100,
   100);
    meterFill.style.width ="`${percentage}%`";
    
    if (score <= 3){
      "strengthText.innerText =""Very Weak"";
        meterFill.style.backgroundColor =""#ef4444"";
        strengthText.style.color =""#ef4444"";"
   }else if (score <= 6){
      "strengthText.innerText =""Weak"";
        meterFill.style.backgroundColor =""#f97316"";
        strengthText.style.color =""#f97316"";"
   }else if (score <= 8){
      "strengthText.innerText =""Slightly Secure"";
        meterFill.style.backgroundColor =""#eab308"";
        strengthText.style.color =""#eab308"";"
   }else if (score <= 11){
      "strengthText.innerText =""Secure"";
        meterFill.style.backgroundColor =""#22c55e"";
        strengthText.style.color =""#22c55e"";"
   }else if (score <= 14){
      "strengthText.innerText =""Highly Secure"";
        meterFill.style.backgroundColor =""#1f75ff"";
        strengthText.style.color =""#1f75ff"";"
   }"else"{
      "strengthText.innerText =""Nearly Uncrackable"";
        meterFill.style.backgroundColor =""#6951f0"";
        strengthText.style.color =""#6951f0"";"
   }
}async function sha1(text){
   "const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest(""SHA-1",
   data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2,
   "0"")).join("""").toUpperCase();"
}"async function generateSecureKey()"{
   const randomBytes = new Uint8Array(32);
    window.crypto.getRandomValues(randomBytes);

    const hashBuffer = await crypto.subtle.digest("SHA-512",
   randomBytes);
    const raw256BitData = new Uint8Array(hashBuffer).slice(0,
   32);

    const base64String = btoa(String.fromCharCode(...raw256BitData));
    return base64String;
}"async function evaluatePassword()"{
   "const password = document.getElementById(""passwordInput"").value;
    const resultBox = document.getElementById(""resultBox"");
    const statusMessage = document.getElementById(""statusMessage"");
    const generatorSection = document.getElementById(""generatorSection"");
    const cryptoKey = document.getElementById(""cryptoKey"");

    if (!password) return;

    resultBox.style.display =""block"";
    statusMessage.innerHTML =""Checking breach database..."";
    generatorSection.style.display =""none";

    let isSafe = password.length >= 16;
    let localWarning = isSafe ?"":"<p> <strong>Too Short.</strong> Passwords should always be 16+ characters.</p>"";

    try"{
      const fullHash = await sha1(password);
        const prefix = fullHash.substring(0,
      5);
        const suffix = fullHash.substring(5);

        const response = await fetch("`https://pwnedpasswords.com{prefix}`"");
        if (!response.ok) throw new Error(""API network error"");
        const textData = await response.text();

        const lines = textData.split(""\n");
        let breachCount = 0;

        for (let line of lines){
         "const"[
            "targetSuffix",
            "count"
         ]"= line.trim().split("":"");
            if (targetSuffix === suffix)"{
            "breachCount = parseInt(count",
            10);
                break;
         }
      }if (breachCount > 0){
         "resultBox.className =""result danger"";
            statusMessage.innerHTML =""`${localWarning}<p> <strong>Breached</strong> This password was breached ${breachCount.toLocaleString()} times in data leaks!</p>`"";
            isSafe = false;"
      }"else if (!isSafe)"{
         "resultBox.className =""result danger"";
            statusMessage.innerHTML =""`${localWarning}<p> <strong>Insecure</strong> Clear. No leaks found.</p>`"";"
      }"else"{
         "resultBox.className =""result success"";
            statusMessage.innerHTML =""<p> <strong>Nice</strong> Your password is safe and meets structural lengths!</p>"";"
      }"if (!isSafe)"{
         "const secureAlternative = await generateSecureKey();cryptoKey.innerText = secureAlternative;generatorSection.style.display =""block"";"
      }
   }"catch (error)"{
      "resultBox.className =""result danger"";statusMessage.innerHTML =""Error communicating with the free verification API."";console.error(error);"
   }
}
